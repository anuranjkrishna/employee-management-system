<!DOCTYPE html>
<html>
<head>

    <title>Add Employee</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 40px;
        }

        .container{
            width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            margin-top: 20px;
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
        }

    </style>

</head>
<body>

    <div class="container">

        <h2>Add Employee</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Add Employee</button>

        </form>

    </div>

</body>
</html>
